<!DOCTYPE html>
<script>
    function restart_test() {
        $.ajax({
            type: "POST",
            url: "{{ url_for('results.results') }}",
            contentType:'application/json',
            data : JSON.stringify({"action": "to_instructions"}),
            success: function () {
                window.location = "/instructions";
            },
            error: function(req, err) {
                console.log("error ", err)
            }
        })
    }
</script>

{% extends "layouts/base.html" %}

{% block TITLE %} | Test{% endblock %}
{% block CONTENT %}
<div class="components">
    <div class="component">
        <p class="text">Compare your results to others' using 8D-PolComp's data visualisation tool.</p>
        <a class="button center-content flex" href="/data">Data</a>
    </div>
    <div class="component">
        <p class="text">Click the button below if you'd like to take the test again!</p>
        <a class="button center-content flex" href="" onclick="restart_test()">Restart Test</a>
    </div>
</div>
<div class="component">
    <p class="text">Results</p>
    <p>{{results}}</p>
</div>

{% endblock %}
